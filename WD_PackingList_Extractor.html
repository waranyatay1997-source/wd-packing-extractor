<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WD Packing List Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; padding: 2rem; }
  .container { max-width: 860px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  #drop-zone {
    border: 2px dashed #ccc; border-radius: 10px; padding: 2.5rem;
    text-align: center; cursor: pointer; transition: background 0.15s, border-color 0.15s;
    background: #fafafa; margin-bottom: 1.25rem;
  }
  #drop-zone:hover, #drop-zone.drag-over { background: #eef4ff; border-color: #4a90d9; }
  #drop-zone .icon { font-size: 36px; margin-bottom: 8px; }
  #drop-zone p { font-weight: 500; margin-bottom: 4px; }
  #drop-zone small { color: #888; font-size: 12px; }
  #file-input { display: none; }
  .file-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f0f0f0; border: 1px solid #ddd;
    border-radius: 6px; padding: 4px 10px; font-size: 12px; margin: 3px;
  }
  .remove-btn { cursor: pointer; color: #aaa; font-size: 14px; }
  .remove-btn:hover { color: #e44; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  button {
    padding: 8px 18px; border-radius: 7px; border: 1px solid #ccc;
    cursor: pointer; font-size: 14px; font-weight: 500;
    background: #fff; color: #333; transition: background 0.1s;
  }
  button:hover { background: #f5f5f5; }
  button.primary { background: #222; color: #fff; border-color: #222; }
  button.primary:hover { background: #444; }
  button.export { background: #1a6e36; color: #fff; border-color: #1a6e36; }
  button.export:hover { background: #24924a; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  #status { font-size: 13px; color: #666; margin-top: 6px; min-height: 20px; }
  #results-section { margin-top: 1.5rem; }
  .section-label { font-size: 12px; color: #999; margin-bottom: 8px; }
  .badge { display: inline-block; background: #e6f4ea; color: #1a6e36; font-size: 11px; padding: 2px 8px; border-radius: 5px; margin-left: 6px; }
  .table-wrap { overflow-x: auto; border: 1px solid #e0e0e0; border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 12px; background: #f5f5f5; border-bottom: 1px solid #e0e0e0; font-weight: 600; color: #555; white-space: nowrap; }
  td { padding: 7px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; word-break: break-word; }
  tr:last-child td { border-bottom: none; }
  tr.group-first td { border-top: 2px solid #ddd; }
  tr.group-first:first-child td { border-top: none; }
  .note { font-size: 12px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>📦 WD Packing List Extractor</h1>
  <p class="subtitle">อัปโหลด PDF หลายไฟล์พร้อมกัน แล้ว export ข้อมูล Shipment & Pallet ID เป็น Excel (.csv)</p>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📄</div>
    <p>คลิกหรือลาก PDF มาวางที่นี่</p>
    <small>รองรับหลายไฟล์พร้อมกัน (.pdf)</small>
  </div>
  <input type="file" id="file-input" accept=".pdf" multiple>

  <div id="file-list" style="margin-bottom: 1rem;"></div>

  <div class="btn-row">
    <button class="primary" id="extract-btn" disabled onclick="extractAll()">▶ ดึงข้อมูล</button>
    <button class="export" id="export-btn" disabled onclick="exportCSV()">⬇ Export Excel (.csv)</button>
    <button onclick="clearAll()">ล้างทั้งหมด</button>
  </div>
  <div id="status"></div>

  <div id="results-section" style="display:none;">
    <p class="section-label">ผลลัพธ์ <span id="row-count" class="badge"></span></p>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Shipment Number / Shipping Mark</th>
            <th>Marks &amp; Pallet ID / Package ID</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
    <p class="note">* ไฟล์ .csv เปิดได้ใน Microsoft Excel ได้เลย</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let files = [];
let results = [];

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const extractBtn = document.getElementById('extract-btn');
const exportBtn = document.getElementById('export-btn');
const status = document.getElementById('status');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files].filter(f => f.type === 'application/pdf'));
});
fileInput.addEventListener('change', e => { addFiles([...e.target.files]); fileInput.value = ''; });

function addFiles(newFiles) {
  newFiles.forEach(f => { if (!files.find(x => x.name === f.name)) files.push(f); });
  renderFileList();
}

function renderFileList() {
  fileList.innerHTML = '';
  files.forEach((f, i) => {
    const tag = document.createElement('span');
    tag.className = 'file-tag';
    tag.innerHTML = `📄 ${f.name} <span class="remove-btn" onclick="removeFile(${i})">✕</span>`;
    fileList.appendChild(tag);
  });
  extractBtn.disabled = files.length === 0;
  if (files.length === 0) {
    document.getElementById('results-section').style.display = 'none';
    exportBtn.disabled = true;
    results = [];
  }
}

function removeFile(i) { files.splice(i, 1); renderFileList(); }

function clearAll() {
  files = []; results = [];
  renderFileList();
  status.textContent = '';
  document.getElementById('results-section').style.display = 'none';
  exportBtn.disabled = true;
}

async function extractItemsFromPDF(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  const allItems = [];
  let yOffset = 0;
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const content = await page.getTextContent();
    const viewport = page.getViewport({ scale: 1 });
    const pageH = viewport.height;
    content.items.forEach(item => {
      if (!item.str.trim()) return;
      const x = item.transform[4];
      const y = pageH - item.transform[5];
      allItems.push({ str: item.str.trim(), x, y: y + yOffset });
    });
    yOffset += pageH;
  }
  return allItems;
}

function parseData(items, filename) {
  const fullText = items.map(i => i.str).join(' ');
  const shipmentMatch = fullText.match(/(\d{8}-\d{5})/);
  const shipmentNum = shipmentMatch ? shipmentMatch[1] : '-';

  // หา header คอลัมน์ "Marks & Pallet ID"
  let colX = null, colY = null;
  for (const item of items) {
    if (item.str.includes('Marks') || item.str.includes('Package ID')) {
      colX = item.x;
      colY = item.y;
      break;
    }
  }

  if (colX === null) {
    return [{ shipment: shipmentNum, palletId: '-' }];
  }

  // หาขอบขวาของคอลัมน์ (คอลัมน์ Qty อยู่ถัดไป)
  let nextColX = colX + 130;
  for (const item of items) {
    if ((item.str === 'Qty' || item.str === 'QTY') && item.y < colY + 40) {
      nextColX = item.x;
      break;
    }
  }

  // หาจุดหยุด
  let stopY = Infinity;
  for (const item of items) {
    if ((item.str.includes('Total Value') || item.str === 'NOTE:' || item.str === 'NOTE') && item.y > colY) {
      if (item.y < stopY) stopY = item.y;
    }
  }

  // ดึง text ทั้งหมดในคอลัมน์ Marks เรียงตาม y (บนลงล่าง)
  const colItems = items
    .filter(item => {
      if (item.y <= colY + 10) return false;
      if (item.y >= stopY) return false;
      if (item.x < colX - 30 || item.x > nextColX - 5) return false;
      // กรองออก: ตัวเลขล้วน, QTY, คำสั้นๆ ที่ไม่ใช่ ID
      const s = item.str;
      if (/^QTY/i.test(s)) return false;
      if (/^\d+$/.test(s)) return false;
      if (/^(TH|COO|Seq|Lin|Part|Order|Customer|DN|Customs|Marks|Package|Pallet|Net|Weight|Line|Count|ID)$/i.test(s)) return false;
      if (/^(Package ID|Pallet ID|Marks & Pallet|Package ID\s*)$/i.test(s)) return false;
      // กรอง header/footer ที่หลุดมาจากหน้าถัดไป
      if (/^Page\s+\d+\s+of\s+\d+/i.test(s)) return false;
      if (/Org\s*ID|LTHLC|LTTHC/i.test(s)) return false;
      if (/^Marks\s*&\s*Pallet/i.test(s)) return false;
      if (/Delivery Order|Packing List|Invoice Number|Invoice Date|Scheduled Ship/i.test(s)) return false;
      if (/Print date|UTC Date/i.test(s)) return false;
      // กรอง string ที่มีคำ header ปนอยู่ เช่น "Page 2 of 6Org IDLTHLC1/FGIMarks & Pallet ID /MDPDS..."
      if (/Page\s*\d|Org\s*ID|Marks\s*&|Pallet\s*ID\s*\//i.test(s)) return false;
      return true;
    })
    .sort((a, b) => a.y - b.y);

  // ต่อ text ทั้งหมดเป็น string เดียว แล้วแยกด้วย comma
  // วิธีนี้รองรับ ID ที่ถูกตัดขึ้นบรรทัดใหม่ เช่น "PY8A31902" + "P," → "PY8A31902P"
  // โดยถ้า item ก่อนหน้าไม่ลงท้ายด้วย comma ให้ต่อตรงๆ
  let combined = '';
  for (let i = 0; i < colItems.length; i++) {
    const s = colItems[i].str;
    if (i === 0) {
      combined = s;
    } else {
      // ถ้า text ก่อนหน้าลงท้ายด้วย comma หรือ space แล้ว ต่อปกติ
      if (combined.endsWith(',') || combined.endsWith(' ')) {
        combined += s;
      } else {
        // ไม่มี comma = บรรทัดถัดไปเป็นส่วนต่อของ ID เดิม ต่อตรงๆ
        combined += s;
      }
    }
  }

  // แยกด้วย comma แล้ว trim
  const rawIds = combined
    .split(',')
    .map(s => s.trim())
    .filter(s => s.length >= 3);

  // กรอง noise ที่หลุดมา และ deduplicate
  const filtered = rawIds.filter(s => {
    if (/^\d+$/.test(s)) return false;
    if (/^(TH|QTY|COO)$/i.test(s)) return false;
    if (/^(Package ID|Pallet ID|Package|Pallet|Marks|ID)$/i.test(s)) return false;
    if (s.length < 5) return false;
    return true;
  });

  const uniqueIds = [...new Set(filtered)];

  if (uniqueIds.length === 0) {
    return [{ shipment: shipmentNum, palletId: '-' }];
  }

  return uniqueIds.map(id => ({ shipment: shipmentNum, palletId: id }));
}

async function extractAll() {
  results = [];
  status.textContent = 'กำลังดึงข้อมูล...';
  extractBtn.disabled = true;
  document.getElementById('results-section').style.display = 'none';

  for (let i = 0; i < files.length; i++) {
    status.textContent = `กำลังอ่านไฟล์ ${i + 1}/${files.length}: ${files[i].name}`;
    try {
      const items = await extractItemsFromPDF(files[i]);
      results.push(...parseData(items, files[i].name));
    } catch(e) {
      results.push({ shipment: 'Error', palletId: e.message });
    }
  }

  renderResults();
  extractBtn.disabled = false;
  status.textContent = `เสร็จสิ้น — พบข้อมูล ${results.length} แถว`;
}

function renderResults() {
  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '';
  results.forEach((r, idx) => {
    const tr = document.createElement('tr');
    const isFirst = idx === 0 || results[idx - 1].shipment !== r.shipment;
    tr.className = isFirst ? 'group-first' : 'group-cont';
    tr.innerHTML = `<td>${r.shipment}</td><td>${r.palletId}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('row-count').textContent = `${results.length} รายการ`;
  document.getElementById('results-section').style.display = 'block';
  exportBtn.disabled = results.length === 0;
}

function exportCSV() {
  const header = ['Shipment Number / Shipping Mark', 'Marks & Pallet ID / Package ID'];
  const rows = results.map(r => [r.shipment, r.palletId]);
  const csv = [header, ...rows].map(row =>
    row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
  ).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `packing_list_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
